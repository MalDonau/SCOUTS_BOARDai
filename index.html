<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scouts · Yahoo Home</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Libre+Caslon+Text:ital@0;1&display=swap" rel="stylesheet" />
<style>
  :root{
    --purple:#7D2EFF;--purple-lt:#D1B5FF;--yellow:#F8FB4C;
    --bg:#0c0c0e;--panel:#141417;--panel-2:#1b1b1f;--line:#2a2a30;
    --text:#f4f4f6;--muted:#8b8b95;
    --sans:'Poppins',Arial,sans-serif;--serif:'Libre Caslon Text',Georgia,serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.55;-webkit-font-smoothing:antialiased}
  a{color:var(--purple-lt);text-decoration:none}
  .app{display:flex;min-height:100vh}
  .sidebar{width:240px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--line);position:sticky;top:0;height:100vh;padding:26px 18px;display:flex;flex-direction:column}
  .brand{display:flex;align-items:baseline;gap:6px;margin-bottom:4px;cursor:pointer}
  .brand .logo{font-weight:800;font-size:26px;letter-spacing:-1px}
  .brand .logo .b{color:var(--purple)}
  .brand-sub{font-family:var(--serif);font-style:italic;color:var(--muted);font-size:13px;margin-bottom:16px}
  .toggle{display:inline-flex;background:var(--panel-2);border:1px solid var(--line);border-radius:30px;padding:3px}
  .toggle button{border:none;background:none;color:var(--muted);font-family:var(--sans);font-weight:700;font-size:12px;padding:5px 14px;border-radius:30px;cursor:pointer;transition:.15s}
  .toggle button.on{background:var(--purple);color:#fff}
  .toggle-top{position:fixed;top:20px;right:24px;z-index:50;box-shadow:0 6px 18px rgba(0,0,0,.45)}
  @media(max-width:860px){.toggle-top{display:none}}
  .nav-label{font-size:10px;text-transform:uppercase;letter-spacing:1.6px;color:var(--muted);margin:20px 0 8px}
  .nav a{display:flex;align-items:center;gap:10px;color:var(--text);padding:9px 12px;border-radius:9px;font-size:14px;font-weight:500;margin-bottom:2px;cursor:pointer;transition:.15s}
  .nav a:hover{background:var(--panel-2)}
  .nav a.active{background:var(--purple);color:#fff;font-weight:600}
  .nav a .dot{width:7px;height:7px;border-radius:50%;background:var(--line);flex-shrink:0}
  .nav a.active .dot{background:var(--yellow)}
  .side-foot{margin-top:auto;font-size:11px;color:var(--muted);padding-top:18px;border-top:1px solid var(--line)}
  .topbar{display:none;position:sticky;top:0;z-index:40;background:var(--panel);border-bottom:1px solid var(--line);align-items:center;justify-content:space-between;padding:13px 16px}
  .topbar .logo{font-weight:800;font-size:22px}.topbar .logo .b{color:var(--purple)}
  .topbar-right{display:flex;align-items:center;gap:10px}
  .menu-btn{background:none;border:1px solid var(--line);color:var(--text);border-radius:8px;padding:6px 12px;cursor:pointer;font-family:var(--sans);font-weight:600}
  .main{flex:1;min-width:0;position:relative}
  .wrap{max-width:1040px;margin:0 auto;padding:40px 36px 80px}
  .view{display:none}.view.active{display:block}
  .page-head{margin-bottom:26px}
  .page-head .kicker{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--purple-lt);font-weight:700;margin-bottom:8px}
  .page-head h1{font-size:clamp(30px,5vw,52px);font-weight:800;letter-spacing:-1.5px;line-height:1}
  .page-head p{color:var(--muted);max-width:560px;margin-top:10px;font-size:15px}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 26px}
  .chip{background:var(--panel-2);border:1px solid var(--line);color:var(--muted);border-radius:30px;padding:6px 14px;font-size:12.5px;font-weight:600;cursor:pointer;transition:.15s}
  .chip:hover{color:var(--text);border-color:#444}
  .chip.active{background:var(--yellow);color:#000;border-color:var(--yellow)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:16px}
  .scout{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:16px;cursor:pointer;transition:.18s;position:relative;overflow:hidden}
  .scout:hover{transform:translateY(-3px);border-color:#3a3a44;box-shadow:0 10px 30px rgba(0,0,0,.5)}
  .scout .tile{aspect-ratio:1;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;position:relative;overflow:hidden}
  .scout .tile img{width:100%;height:100%;object-fit:cover;object-position:center 30%}
  .scout .name{font-weight:700;font-size:15px}
  .scout .meta{font-size:11.5px;color:var(--muted);margin-top:1px}
  .scout .px{position:absolute;top:10px;right:10px;font-size:10px;color:rgba(255,255,255,.7);background:rgba(0,0,0,.45);border-radius:20px;padding:2px 7px;font-weight:600;z-index:2}
  .mark{width:46%;position:relative}
  .mark .bar{height:60px;border-radius:6px;transform:skewX(-11deg);margin:0 auto;width:30px}
  .mark .dot{width:26px;height:26px;border-radius:50%;margin:8px auto 0}
  .mark.sm{width:34%}.mark.sm .bar{height:42px;width:21px}.mark.sm .dot{width:18px;height:18px;margin-top:6px}
  .mark.xs .bar{height:14px;width:7px;border-radius:2px}.mark.xs .dot{width:6px;height:6px;margin-top:2px}

  /* ---------- Scout detail page ---------- */
  .back{display:inline-flex;align-items:center;gap:7px;background:var(--panel-2);border:1px solid var(--line);color:var(--text);
    border-radius:9px;padding:7px 13px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:20px}
  .back:hover{border-color:#444}
  .sd-head{display:flex;align-items:center;gap:16px;margin-bottom:8px;flex-wrap:wrap}
  .sd-swatch{width:46px;height:46px;border-radius:12px;flex-shrink:0;border:1px solid rgba(255,255,255,.18)}
  .sd-head h1{font-size:clamp(26px,4vw,40px);font-weight:800;letter-spacing:-1px;line-height:1}
  .sd-cat{font-size:12.5px;color:var(--muted)}
  .badge-cat{display:inline-block;background:var(--purple);color:#fff;font-size:11px;font-weight:700;border-radius:20px;padding:3px 11px;margin-left:4px}
  .sd-grid{display:grid;grid-template-columns:1fr;gap:28px;margin-top:26px}
  .sd-sec h3{font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--purple-lt);font-weight:700;margin-bottom:12px}
  .concept{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px}
  .concept .row{display:flex;gap:10px;font-size:13.5px;padding:6px 0;border-bottom:1px solid var(--line)}
  .concept .row:last-child{border-bottom:none}
  .concept .row b{min-width:96px;color:var(--muted);font-weight:600}
  .tags{display:flex;flex-wrap:wrap;gap:7px}
  .tag{border:1px solid var(--line);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;color:#d7d7dd}
  .states{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .state{text-align:center}
  .state .sbox{aspect-ratio:1;border-radius:12px;background:var(--panel-2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;margin-bottom:6px;overflow:hidden}
  .state .sbox img{width:100%;height:100%;object-fit:cover}
  .state b{font-size:12px;display:block}
  .state small{font-size:10.5px;color:var(--muted);display:block;line-height:1.25;margin-top:2px}

  /* dropzone */
  .dropzone{border:2px dashed var(--line);border-radius:16px;padding:32px 20px;text-align:center;cursor:pointer;transition:.15s;background:var(--panel)}
  .dropzone:hover{border-color:var(--purple)}
  .dropzone.drag{border-color:var(--purple);background:rgba(125,46,255,.08)}
  .dropzone .dz-ic{font-size:30px;color:var(--purple-lt);margin-bottom:8px}
  .dropzone .dz-main{font-weight:600;font-size:14px}
  .dropzone .dz-sub{font-size:12px;color:var(--muted);margin-top:4px}

  /* options grid */
  .opts{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:12px;margin-top:16px}
  .opt{position:relative;aspect-ratio:1;border-radius:12px;overflow:hidden;border:2px solid var(--line);cursor:pointer;background:var(--panel-2)}
  .opt img{width:100%;height:100%;object-fit:cover;display:block}
  .opt.sel{border-color:var(--purple);box-shadow:0 0 0 3px rgba(125,46,255,.3)}
  .opt .check{position:absolute;top:6px;left:6px;width:22px;height:22px;border-radius:50%;background:var(--purple);color:#fff;display:none;align-items:center;justify-content:center;font-size:13px;font-weight:800}
  .opt.sel .check{display:flex}
  .opt .del{position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;border:none;cursor:pointer;font-size:14px;line-height:1;display:none}
  .opt:hover .del{display:block}
  .opts-empty{font-size:13px;color:var(--muted);margin-top:14px}

  /* placements */
  .place-wrap{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px}
  .place-row{display:flex;align-items:center;gap:22px;flex-wrap:wrap}
  .place{display:flex;flex-direction:column;align-items:center;gap:7px}
  .place small{font-size:10.5px;color:var(--muted)}
  .pa{border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;background:var(--panel-2);border:1px solid var(--line)}
  .pa img{width:100%;height:100%;object-fit:cover;object-position:center 30%}
  .pa.r{border-radius:10px}
  .p24{width:24px;height:24px}.p32{width:32px;height:32px}.p48{width:48px;height:48px}.p72{width:72px;height:72px}
  .listrow{display:flex;align-items:center;gap:12px;background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:11px 14px;max-width:360px;margin-top:18px}
  .listrow . tx{flex:1}
  .listrow .t1{font-size:13px;font-weight:600}
  .listrow .t2{font-size:11px;color:var(--muted)}
  .hero-place{margin-top:18px;border:1px solid var(--line);border-radius:14px;overflow:hidden;aspect-ratio:16/7;display:flex;align-items:center;justify-content:center;background:var(--panel-2)}
  .hero-place img{width:100%;height:100%;object-fit:cover}
  /* generate / nano banana */
  .genbtn{background:var(--purple);color:#fff;border:none;border-radius:10px;padding:11px 18px;font-family:var(--sans);font-weight:700;font-size:14px;cursor:pointer;transition:.15s}
  .genbtn:hover{filter:brightness(1.08)}
  .genbtn:disabled{cursor:not-allowed;opacity:.5}
  .genbtns{display:flex;gap:10px;flex-wrap:wrap}
  .ghostbtn{background:var(--panel-2);border:1px solid var(--line)}
  .ghostbtn:hover{filter:none;border-color:var(--purple)}
  .genloading{display:flex;align-items:center;gap:10px;margin-top:14px;font-size:14px;color:var(--purple-lt)}
  .spin{width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--purple);border-radius:50%;animation:sp .8s linear infinite;display:inline-block}
  @keyframes sp{to{transform:rotate(360deg)}}
  .generr{margin-top:14px;font-size:13px;color:#ff6a61;background:rgba(255,106,97,.08);border:1px solid rgba(255,106,97,.3);border-radius:10px;padding:12px;word-break:break-word}
  .genresult{margin-top:16px}
  .genresult img{max-width:340px;width:100%;border-radius:14px;border:1px solid var(--line);display:block}
  .genactions{display:flex;gap:10px;margin-top:10px}
  .dl{display:inline-block;background:var(--panel-2);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none}
  .dl:hover{border-color:var(--purple);text-decoration:none}
  .dl.ghost{background:none}
  .setlbl{display:block;font-size:12px;color:var(--muted);font-weight:600;margin:14px 0 6px}
  .setinput{width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:9px;padding:10px 12px;color:var(--text);font-family:var(--sans);font-size:13px}
  .setinput:focus{outline:none;border-color:var(--purple)}
  .tplrow{display:flex;align-items:center;gap:12px}
  .tplprev{width:78px;height:128px;object-fit:cover;border-radius:8px;border:1px solid var(--line);background:var(--panel-2)}
  .setmsg{color:#46d17a;font-size:13px;font-weight:600;margin-left:8px}
  .genGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(78px,1fr));gap:10px;margin-top:14px}
  .genThumb{position:relative;aspect-ratio:9/16;border-radius:12px;overflow:hidden;border:1px solid var(--line);cursor:pointer;background:var(--panel-2)}
  .genThumb img{width:100%;height:100%;object-fit:cover;display:block;transition:.15s}
  .genThumb:hover{border-color:var(--purple)}.genThumb:hover img{transform:scale(1.04)}
  .genThumb .del{position:absolute;top:5px;right:5px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,.65);color:#fff;border:none;cursor:pointer;font-size:13px;line-height:1;display:none}
  .genThumb:hover .del{display:block}
  .genThumb.on{border-color:var(--purple);box-shadow:0 0 0 2px rgba(125,46,255,.4)}
  .genFeatured{margin-top:16px}
  .genFeatured img{width:100%;max-width:300px;aspect-ratio:9/16;object-fit:cover;border-radius:16px;border:1px solid var(--line);display:block;cursor:zoom-in}
  .genFeatured .genactions{margin-top:10px}
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:90;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:30px}
  .lightbox.open{display:flex}
  .lightbox img{max-height:80vh;max-width:92vw;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
  .lb-close{position:absolute;top:20px;right:24px;width:40px;height:40px;border-radius:10px;background:var(--panel);border:1px solid var(--line);color:#fff;font-size:22px;cursor:pointer}

  .note{background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:14px;font-size:13px;color:var(--muted);margin-top:18px}
  .note b{color:var(--purple-lt)}.pending{color:#ffd23c}

  /* reference views */
  .ref h2{font-size:clamp(24px,4vw,38px);font-weight:800;letter-spacing:-1px;margin-bottom:6px}
  .ref .lead{font-family:var(--serif);font-size:18px;color:#d7d7dd;max-width:640px;margin:8px 0 26px;line-height:1.5}
  .ref h3{font-size:16px;font-weight:700;margin:24px 0 10px}
  .cards3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .cards2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  .rcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px}
  .rcard h4{font-size:15px;margin-bottom:6px}.rcard p{font-size:13.5px;color:var(--muted)}
  .rcard.accent{background:var(--purple);border-color:var(--purple)}
  .rcard.accent h4,.rcard.accent p{color:#fff}.rcard.accent p{opacity:.92}
  ul.clean{list-style:none;margin-top:8px}
  ul.clean li{padding-left:22px;position:relative;font-size:14px;margin-bottom:8px;color:#d7d7dd}
  ul.clean li::before{content:"!";position:absolute;left:0;color:var(--purple-lt);font-family:var(--serif);font-weight:700}
  .swrow{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;margin-top:8px}
  .sw{border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .sw .c{height:60px}.sw .m{padding:6px 8px;font-size:10px;background:var(--panel-2)}
  .sw .m b{display:block;font-size:12px}.sw .m code{color:var(--muted);font-family:monospace}
  .dd{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:8px}
  .dd .lab{font-weight:700;font-size:13px;margin-bottom:6px}.dd .ok{color:#46d17a}.dd .no{color:#ff6a61}
  .dd ul{list-style:none}.dd li{font-size:13.5px;color:#d7d7dd;padding:5px 0;border-bottom:1px solid var(--line)}
  @media(min-width:760px){.sd-grid.two{grid-template-columns:1fr 1fr}}

  /* ---------- Board (Miro-like canvas) ---------- */
  body.board-active{overflow:hidden}
  .board-viewport{position:absolute;inset:0;overflow:hidden;background:
    radial-gradient(circle at 1px 1px,var(--line) 1px,transparent 0) 0 0/26px 26px,var(--bg);
    touch-action:none;cursor:default;user-select:none}
  .board-viewport.grab{cursor:grab}
  .board-viewport.panning{cursor:grabbing}
  .bnode.sel{outline:2.5px solid var(--purple);outline-offset:3px;border-radius:4px}
  .board-projects{position:absolute;top:16px;left:18px;z-index:22;display:flex;gap:6px;align-items:center;
    background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:5px 6px;box-shadow:0 6px 18px rgba(0,0,0,.4)}
  .board-projects select{background:var(--panel-2);border:1px solid var(--line);color:var(--text);font-family:var(--sans);
    font-weight:700;font-size:13px;border-radius:8px;padding:6px 8px;max-width:170px;cursor:pointer;outline:none}
  .board-projects button{background:var(--panel-2);border:1px solid var(--line);color:var(--text);font-size:13px;font-weight:700;
    width:30px;height:30px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .board-projects button:hover{border-color:var(--purple)}
  .board-marquee{position:absolute;z-index:30;border:1.5px solid var(--purple);background:rgba(125,46,255,.14);border-radius:3px;pointer-events:none}
  .board-marquee[hidden]{display:none}
  .board-world{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
  .bnode{position:absolute;user-select:none}
  .bnode img{-webkit-user-drag:none;user-drag:none;-webkit-touch-callout:none}
  .bnode .scout{width:184px;cursor:pointer}
  .bnode .bdel{position:absolute;top:-9px;right:-9px;width:22px;height:22px;border-radius:50%;
    background:rgba(0,0,0,.72);color:#fff;border:1px solid var(--line);cursor:pointer;font-size:13px;
    line-height:1;display:none;align-items:center;justify-content:center;z-index:3}
  .bnode:hover .bdel{display:flex}
  .blabel{position:relative;font-family:var(--sans);font-weight:600;font-size:19px;color:var(--text);
    padding:5px 9px;border-radius:8px;min-width:26px;white-space:pre-wrap;max-width:420px;cursor:move;line-height:1.3}
  .blabel:hover{background:var(--panel-2)}
  .blabel[contenteditable="true"]{outline:1px solid var(--purple);background:var(--panel);cursor:text;user-select:text}
  .board-toolbar{position:absolute;left:50%;bottom:20px;transform:translateX(-50%);z-index:20;display:flex;gap:6px;
    background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:6px;box-shadow:0 8px 24px rgba(0,0,0,.5)}
  .board-toolbar button{background:var(--panel-2);border:1px solid var(--line);color:var(--text);
    font-family:var(--sans);font-weight:600;font-size:13px;padding:7px 13px;border-radius:9px;cursor:pointer;transition:.15s}
  .board-toolbar button:hover{border-color:var(--purple)}
  .board-toolbar .bsep{width:1px;background:var(--line);margin:2px}
  .board-hint{position:absolute;top:16px;left:50%;transform:translateX(-50%);z-index:20;color:var(--muted);
    font-size:12px;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:5px 14px;pointer-events:none}
  /* prompt node */
  .pnode{width:240px;background:var(--panel);border:1px solid var(--purple);border-radius:14px;padding:12px 13px;cursor:grab;
    font-size:13px;line-height:1.4;color:var(--text);box-shadow:0 6px 18px rgba(0,0,0,.4)}
  .pnode .pn-tag{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--purple-lt);font-weight:700;margin-bottom:6px}
  .pnode .pn-txt{white-space:pre-wrap;max-height:160px;overflow:auto}
  .pnode .pn-foot{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap;align-items:center}
  .pnode .pn-gen{background:var(--panel-2);border:1px solid var(--line);color:var(--text);border-radius:8px;
    padding:5px 10px;font-family:var(--sans);font-weight:600;font-size:11.5px;cursor:pointer}
  .pnode .pn-gen:hover{border-color:var(--purple)}
  .pnode .pn-batch{width:42px;background:var(--panel-2);border:1px solid var(--line);color:var(--text);border-radius:8px;
    padding:4px 5px;font-family:var(--sans);font-weight:700;font-size:12px;text-align:center;cursor:text}
  .pnode .pn-batch:focus{outline:none;border-color:var(--purple)}
  .pnode .pn-load{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;color:var(--purple-lt);font-weight:600}
  .pnode .pn-err{font-size:11px;color:#ff7a70}

  .bc-attach[hidden]{display:none}
  .bc-input{display:flex;gap:8px;padding:10px;border-top:1px solid var(--line)}
  .bc-input textarea{flex:1;resize:none;background:var(--panel-2);border:1px solid var(--line);border-radius:9px;color:var(--text);
    font-family:var(--sans);font-size:13px;padding:8px 10px;outline:none}
  .bc-input textarea:focus{border-color:var(--purple)}

    brief:`<h2>Brief</h2><p class="lead">Los Scouts son representaciones artísticas de los agentes de IA que guían al usuario por contenido personalizado en Yahoo Home. Compañeros cercanos, intuitivos y humanos.</p><h3>Objetivos</h3><ul class="clean"><li>Sistema cohesivo de personajes por interés, con identidad unificada.</li><li>Whimsy + sofisticación, sin caer en lo infantil.</li><li>Estados de interacción: activo, idle, observando, celebrando.</li><li>Adaptabilidad / personalización por preferencias del usuario.</li><li><b style="color:var(--yellow)">UI-first:</b> legibles a 24–32px.</li><li>Escalable: de 20–50 categorías a futuras UGC.</li></ul><h3>Principios</h3><div class="cards2"><div class="rcard accent"><h4>Curadores expertos, no IA genérica</h4><p>Artesanal, con toque humano. Evitar robots / estética metálica / asistente genérico.</p></div><div class="rcard"><h4>Small-Space First</h4><p>La legibilidad a 24–32px manda sobre el detalle.</p></div></div><div class="note"><b>Pendientes:</b> primera pregunta abierta truncada · evolución "companion-like" · restricciones de animación/rigging · stakeholders de aprobación.</div>`,

/* ============ Image handling ============ */
async function saveToDisk(dataURL,scout,kind){
  try{const res=await fetch('/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({scout,kind,dataURL})});const d=await res.json();if(d&&d.ok&&d.path)return d.path}catch(e){}
  return null;
}
/* ---- Browser image store (IndexedDB): images live in the user's browser, not the server ---- */
let _idb=null;
function idbOpen(){return _idb?Promise.resolve(_idb):new Promise((res,rej)=>{const r=indexedDB.open('scouts-img',1);r.onupgradeneeded=()=>{r.result.createObjectStore('img')};r.onsuccess=()=>{_idb=r.result;res(_idb)};r.onerror=()=>rej(r.error)})}
function idbPut(id,v){return idbOpen().then(db=>new Promise((res,rej)=>{const tx=db.transaction('img','readwrite');tx.objectStore('img').put(v,id);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error)}))}
function idbGet(id){return idbOpen().then(db=>new Promise((res,rej)=>{const rq=db.transaction('img','readonly').objectStore('img').get(id);rq.onsuccess=()=>res(rq.result);rq.onerror=()=>rej(rq.error)}))}
const imgCache={};
function isIdb(s){return typeof s==='string'&&s.indexOf('idb:')===0}
function idbId(s){return s.slice(4)}
function resolveImg(s){if(!isIdb(s))return s;const v=imgCache[idbId(s)];return v||null}
async function storeBoardImage(dataURL){const id='i'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);try{await idbPut(id,dataURL);imgCache[id]=dataURL;return 'idb:'+id}catch(e){return dataURL}}
function addImages(id,files){
  const arr=[...files].filter(f=>f.type.startsWith('image/'));
  arr.forEach(f=>{
    const r=new FileReader();
    r.onload=async ev=>{
      const durl=ev.target.result;
      const path=await saveToDisk(durl,id,'opt');
      const e=entry(id);e.opts.push(path||durl);
      if(e.sel<0)e.sel=e.opts.length-1; // auto-select first
      saveStore();renderOpts(id);renderPlace(id);renderGen(id);renderGrid();
      composeLive(id); // auto-compose on upload
    };
    r.readAsDataURL(f);
  });
}
function selectOpt(id,i){const e=entry(id);e.sel=(e.sel===i?-1:i);saveStore();renderOpts(id);renderPlace(id);renderGen(id);renderGrid();composeLive(id);renderSlot2(id)}
function delOpt(id,i){const e=entry(id);e.opts.splice(i,1);if(e.sel===i)e.sel=-1;else if(e.sel>i)e.sel--;saveStore();renderOpts(id);renderPlace(id);renderGen(id);renderGrid()}

/* ---- Nano Banana (Gemini image) ---- */
async function toInline(src){
  if(isIdb(src)){let d=resolveImg(src);if(!d)d=await idbGet(idbId(src));if(!d)throw new Error('image not found');const c=d.indexOf(',');return {mime:d.slice(5,c).split(';')[0],data:d.slice(c+1)}}
  if(src.indexOf('data:')===0){const c=src.indexOf(',');return {mime:src.slice(5,c).split(';')[0],data:src.slice(c+1)}}
  const blob=await (await fetch(src)).blob();
  const url=await new Promise((res,rej)=>{const fr=new FileReader();fr.onload=()=>res(fr.result);fr.onerror=rej;fr.readAsDataURL(blob)});
  const c=url.indexOf(',');return {mime:url.slice(5,c).split(';')[0],data:url.slice(c+1)};
}

/* ---- Template composer (client-side canvas, deterministic) ---- */
function loadImg(src){return new Promise((res,rej)=>{const im=new Image();im.crossOrigin='anonymous';im.onload=()=>res(im);im.onerror=rej;im.src=src})}
function drawCover(ctx,img,x,y,w,h,fy){fy=(fy==null?0.5:fy);const ir=img.width/img.height,r=w/h;let sw,sh,sx,sy;if(ir>r){sh=img.height;sw=sh*r;sx=(img.width-sw)/2;sy=0}else{sw=img.width;sh=sw/r;sx=0;sy=(img.height-sh)*fy}ctx.drawImage(img,sx,sy,sw,sh,x,y,w,h)}
function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}
function wrapText(ctx,text,x,y,maxW,lh){const words=text.split(' ');let line='',yy=y;for(const w of words){const test=line?line+' '+w:w;if(ctx.measureText(test).width>maxW&&line){ctx.fillText(line,x,yy);line=w;yy+=lh}else line=test}ctx.fillText(line,x,yy)}

async function renderComposite(id,charSrc){
    if(document.fonts&&document.fonts.ready)await document.fonts.ready;
    const img=await loadImg(charSrc);
    const tileScouts=TILE_ORDER.map(tid=>SCOUTS.find(x=>x.id===tid)).filter(Boolean);
    const tImgs={};
    await Promise.all(tileScouts.map(async ts=>{
      let src=ts.id===id?charSrc:selImg(ts.id);
      if(ts.id==='entertainment'&&ts.id!==id){const s2=getSlot2(id);if(s2)src=s2} // per-scout image chosen for the Entertainment slot
      if(src){try{tImgs[ts.id]=await loadImg(src)}catch(e){}}
    }));
    const en=T.en,sc=en.sc[id],s=SCOUTS.find(x=>x.id===id);
    const W=1080,H=1920,cardTop=1470,R=46;
    const cv=document.createElement('canvas');cv.width=W;cv.height=H;const ctx=cv.getContext('2d');
    // hero full-bleed cover
    ctx.fillStyle='#bcd3e6';ctx.fillRect(0,0,W,H);
    drawCover(ctx,img,0,0,W,cardTop,0.32); // anchor toward the eyes (upper third)
    // top gradient for title legibility
    const gt=ctx.createLinearGradient(0,0,0,300);gt.addColorStop(0,'rgba(0,0,0,.35)');gt.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=gt;ctx.fillRect(0,0,W,300);
    // dynamic island (camera capsule)
    const isw=250,ish=56;ctx.fillStyle='#000';rr(ctx,(W-isw)/2,32,isw,ish,ish/2);ctx.fill();
    // status + title
    ctx.fillStyle='#fff';ctx.textAlign='left';ctx.font='600 34px Poppins,Arial';ctx.fillText('9:41',60,118);
    ctx.textAlign='center';ctx.font='800 60px Poppins,Arial';ctx.fillText('Recruit Scouts',W/2,180);
    // dark translucent info card, ROUNDED BOTTOM corners (curve shows the hero at the sides), white text
    const infoTop=cardTop-300;
    ctx.save();ctx.beginPath();
    ctx.moveTo(0,infoTop);ctx.lineTo(W,infoTop);ctx.lineTo(W,cardTop-R);
    ctx.arcTo(W,cardTop,W-R,cardTop,R);ctx.lineTo(R,cardTop);ctx.arcTo(0,cardTop,0,cardTop-R,R);
    ctx.closePath();ctx.clip();
    const ig=ctx.createLinearGradient(0,infoTop,0,cardTop);
    ig.addColorStop(0,'rgba(14,11,16,0)');ig.addColorStop(.4,'rgba(14,11,16,.5)');ig.addColorStop(1,'rgba(14,11,16,.72)');
    ctx.fillStyle=ig;ctx.fillRect(0,infoTop,W,cardTop-infoTop);
    ctx.restore();
    // info text (white)
    ctx.textAlign='left';ctx.fillStyle='#fff';ctx.font='800 54px Poppins,Arial';ctx.fillText(sc.name+' Scout',70,cardTop-150);
    ctx.font='400 30px Poppins,Arial';ctx.fillStyle='rgba(255,255,255,.85)';
    wrapText(ctx,'Your guide to '+sc.theme.toLowerCase()+'.',70,cardTop-98,520,40);
    // white Recruit pill (dark text)
    const bw=224,bh=80,bx=W-bw-60,by=cardTop-176;ctx.fillStyle='#fff';rr(ctx,bx,by,bw,bh,bh/2);ctx.fill();
    ctx.fillStyle='#141414';ctx.font='700 34px Poppins,Arial';ctx.textAlign='center';ctx.fillText('Recruit',bx+bw/2,by+bh/2+12);
    // white carousel panel: its top follows the card's curve so the corners are filled WHITE (curve up at the sides)
    ctx.fillStyle='#fff';ctx.beginPath();
    ctx.moveTo(0,cardTop-R);ctx.arcTo(0,cardTop,R,cardTop,R);ctx.lineTo(W-R,cardTop);ctx.arcTo(W,cardTop,W,cardTop-R,R);
    ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fill();
    // carousel inside the white card
    const tw=152,th=152,gap=30,ty=cardTop+72;let tx=60;
    tileScouts.forEach(ts=>{
      ctx.save();rr(ctx,tx,ty,tw,th,30);ctx.clip();
      if(tImgs[ts.id]){drawCover(ctx,tImgs[ts.id],tx,ty,tw,th,0.28)}else{ctx.globalAlpha=.22;ctx.fillStyle=ts.color;ctx.fillRect(tx,ty,tw,th);ctx.globalAlpha=1}
      ctx.restore();
      if(ts.id===id){ctx.strokeStyle='#4BA3FF';ctx.lineWidth=6;rr(ctx,tx+3,ty+3,tw-6,th-6,28);ctx.stroke();
        ctx.fillStyle='#4BA3FF';ctx.beginPath();ctx.arc(tx+30,ty+30,21,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.font='700 26px Poppins,Arial';ctx.textAlign='center';ctx.fillText('✓',tx+30,ty+39)}
      ctx.fillStyle='#333';ctx.font='500 24px Poppins,Arial';ctx.textAlign='center';
      ctx.fillText(en.sc[ts.id].name,tx+tw/2,ty+th+42);
      tx+=tw+gap;
    });
    // progress pill
    const pw=W-120,ph=82,px=60,py=H-128;ctx.fillStyle='#ececf1';rr(ctx,px,py,pw,ph,ph/2);ctx.fill();
    ctx.fillStyle='#555';ctx.font='600 32px Poppins,Arial';ctx.textAlign='center';
    ctx.fillText('1 of '+tileScouts.length+' Scouts recruited',W/2,py+ph/2+12);

    return cv.toDataURL('image/png');
}
async function generateMockup(id){
  const t=T[lang];
  if(!cfg.key){alert(t.gen.noKey);showView('settings');return}
  const charSrc=selImg(id);
  if(!charSrc){alert(t.gen.selectFirst);return}
  genState[id]={loading:true,error:''};renderGen(id);
  try{
    const [tpl,chr]=await Promise.all([toInline(cfg.tpl),toInline(charSrc)]);
    const PROMPT="You are given two images. IMAGE 1 is a reference phone-UI mockup titled 'Recruit Scouts': a large hero 3D character at the top and a horizontal carousel of character thumbnails at the bottom, where ONE thumbnail is selected/highlighted (blue border + check). IMAGE 2 is a new 3D character mascot. Produce a new image that is IDENTICAL to IMAGE 1 — same phone frame, layout, title text, background, 'Recruit' button, progress bar, status bar, and ALL OTHER thumbnails — but REPLACE exactly two things with the character from IMAGE 2: (1) the big hero character at the top — treat IMAGE 2 as a full-bleed BACKGROUND that COVERS the entire top region edge-to-edge: from the very top of the phone screen all the way DOWN to the top edge of the bottom rounded info/carousel card. Scale it up and CROP it as needed (exactly like CSS object-fit: cover) so there are NO empty sky or background gaps and NO margins around the character — it must touch the left and right screen edges and reach down to that bottom card. The 'Recruit Scouts' title at the very top, and the scout title, description paragraph and white 'Recruit' button near the bottom, all sit ON TOP of this character background and must stay fully legible. AND (2) replace the currently SELECTED/highlighted thumbnail in the bottom carousel with the same character. Keep the new character in the same friendly 3D rendered style, matching lighting, scale and framing so it blends seamlessly. Do not alter any other element. CRITICAL: the output image MUST have a VERTICAL 9:16 portrait aspect ratio (a full-bleed phone screen, e.g. 1080x1920). It must NOT be square / 1:1. Match the exact framing and aspect ratio of IMAGE 1. Output only the final composed image.";
    const body={contents:[{parts:[{text:PROMPT},{inline_data:{mime_type:tpl.mime,data:tpl.data}},{inline_data:{mime_type:chr.mime,data:chr.data}}]}],generationConfig:{responseModalities:["IMAGE"],imageConfig:{aspectRatio:"9:16"}}};
    const res=await fetch('/gemini',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:cfg.model,key:cfg.key,body})});
    const data=await res.json();
    if(!res.ok)throw new Error((data&&data.error&&data.error.message)||('HTTP '+res.status));
    const parts=(((data.candidates||[])[0]||{}).content||{}).parts||[];
    const ip=parts.find(p=>p.inlineData||p.inline_data);
    if(!ip)throw new Error('No image returned by the model.');
    const inl=ip.inlineData||ip.inline_data;
    const durl=`data:${inl.mimeType||inl.mime_type||'image/png'};base64,${inl.data}`;
    const path=await saveToDisk(durl,id,'mockup');
    entry(id).mockups.push(path||durl);
    genState[id]={loading:false,error:''};saveStore();renderGen(id);
  }catch(err){
    genState[id]={loading:false,error:String(err&&err.message||err)};renderGen(id);
  }
}

function nodeInner(it){

      `<div class="name">${sc.name}</div><div class="meta">${t[s.tag]} · ${sc.theme}</div></div>`;
  }

  }

    if(it._loading||!it.src)return loading;

}
function addScoutItem(){

function addTextItem(){

function removeItem(id){board.items=board.items.filter(i=>i.id!==id);board.edges=(board.edges||[]).filter(e=>e.from!==id&&e.to!==id);saveBoard();renderBoard()}
function duplicateItem(id){
  const it=board.items.find(i=>i.id===id);if(!it)return;
  const copy=Object.assign({},it);copy.id=bid();copy.x=(it.x||0)+30;copy.y=(it.y||0)+30;
  delete copy._gen;delete copy._err;
  board.items.push(copy);saveBoard();renderBoard();
}
function cloneItemAt(id){
  const it=board.items.find(i=>i.id===id);if(!it)return null;
  const copy=Object.assign({},it);copy.id=bid();delete copy._gen;delete copy._err;
  board.items.push(copy);return copy;
}
function zoomBy(factor){
  const vp=document.getElementById('boardVp'),r=vp.getBoundingClientRect();
  const sx=r.width/2,sy=r.height/2;
  const wx=(sx-board.panX)/board.zoom,wy=(sy-board.panY)/board.zoom;
  const nz=clamp(board.zoom*factor,ZMIN,ZMAX);
  board.panX=sx-wx*nz;board.panY=sy-wy*nz;board.zoom=nz;
  applyTransform();saveBoard();
}
function startLabelEdit(id){
  const el=document.querySelector('.bnode[data-bid="'+id+'"] .blabel');if(!el)return;
  el.setAttribute('contenteditable','true');el.focus();
  const range=document.createRange();range.selectNodeContents(el);
  const sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);
  const onKey=ev=>{if(ev.key==='Enter'&&!ev.shiftKey){ev.preventDefault();el.blur()}else if(ev.key==='Escape'){el.blur()}};
  const finish=()=>{
    el.removeEventListener('blur',finish);el.removeEventListener('keydown',onKey);
    el.removeAttribute('contenteditable');
    const it=board.items.find(i=>i.id===id);
    if(it){it.text=el.textContent.trim();if(!it.text){removeItem(id);return}}
    saveBoard();
  };
  el.addEventListener('blur',finish);el.addEventListener('keydown',onKey);
}
function startPan(vp,e,sx,sy){vp.classList.add('panning');bDrag={mode:'pan',pointerId:e.pointerId,startSX:sx,startSY:sy,moved:false,startPanX:board.panX,startPanY:board.panY}}
function buildMoves(ids){return ids.map(mid=>{const mit=board.items.find(i=>i.id===mid),mel=document.querySelector('.bnode[data-bid="'+mid+'"]');return mit&&mel?{id:mid,el:mel,sx0:mit.x,sy0:mit.y}:null}).filter(Boolean)}
function onBoardPointerDown(e){
  if(e.button!==0&&e.button!==1)return;
  if(e.target.closest('#boardToolbar'))return;
  if(e.target.isContentEditable)return;
  if(e.target.closest('#boardChat'))return;
  if(e.target.closest('#boardProjects'))return;
  if(e.target.closest('[data-bdel]'))return;
  if(e.target.closest('[data-gen]'))return;
  if(/^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName))return;
  const vp=document.getElementById('boardVp'),r=vp.getBoundingClientRect();
  const sx=e.clientX-r.left,sy=e.clientY-r.top;
  try{vp.setPointerCapture(e.pointerId)}catch(_){}
  // PAN (hand): Space held, middle mouse button
  if(spaceDown||e.button===1){startPan(vp,e,sx,sy);return}
  const port=e.target.closest('.bport');
  if(port){bDrag={mode:'link',pointerId:e.pointerId,fromId:port.dataset.port};const w=document.getElementById('boardWorld');if(w)w.classList.add('linking');return}
  const edge=e.target.closest('.bedge-hit');
  if(edge){bDrag={mode:'edge',pointerId:e.pointerId,edgeId:edge.dataset.edge,startSX:sx,startSY:sy,moved:false};return}
  const nodeEl=e.target.closest('.bnode');
  if(nodeEl){
    let id=nodeEl.dataset.bid;
    if(e.altKey){const copy=cloneItemAt(id);if(copy){selection=new Set([copy.id]);renderBoard();id=copy.id}}
    else if(e.shiftKey){if(selection.has(id))selection.delete(id);else selection.add(id);renderSelection()}
    else if(!selection.has(id)){selection=new Set([id]);renderSelection()}
    const ids=selection.size?[...selection]:[id];
    const moves=buildMoves(ids);moves.forEach(m=>m.el.style.zIndex='2');
    bDrag={mode:'item',pointerId:e.pointerId,startSX:sx,startSY:sy,moved:false,moves,clickedId:id};
  }else{
    // empty space: touch → pan; mouse → marquee select
    if(e.pointerType&&e.pointerType!=='mouse'){startPan(vp,e,sx,sy);return}
    if(!e.shiftKey&&selection.size){selection.clear();renderSelection()}
    bDrag={mode:'marquee',pointerId:e.pointerId,startSX:sx,startSY:sy,moved:false};
    const mq=document.getElementById('boardMarquee');if(mq){mq.hidden=false;mq.style.left=sx+'px';mq.style.top=sy+'px';mq.style.width='0px';mq.style.height='0px'}
  }
}
function onBoardPointerMove(e){
  if(!bDrag||e.pointerId!==bDrag.pointerId)return;
  const vp=document.getElementById('boardVp'),r=vp.getBoundingClientRect();
  const dx=(e.clientX-r.left)-bDrag.startSX,dy=(e.clientY-r.top)-bDrag.startSY;
  if(!bDrag.moved&&Math.hypot(dx,dy)>4)bDrag.moved=true;
  if(bDrag.mode==='link'){
    const wx=(e.clientX-r.left-board.panX)/board.zoom,wy=(e.clientY-r.top-board.panY)/board.zoom;
    const a=nodeRect(bDrag.fromId),tmp=document.getElementById('bedgeTmp');
    if(a&&tmp)tmp.setAttribute('d',edgePath(a.x+a.w,a.y+a.h/2,wx,wy));
    return;
  }
  if(bDrag.mode==='edge')return;
  if(bDrag.mode==='marquee'){
    const cx=e.clientX-r.left,cy=e.clientY-r.top;
    const x=Math.min(cx,bDrag.startSX),y=Math.min(cy,bDrag.startSY),w=Math.abs(cx-bDrag.startSX),h=Math.abs(cy-bDrag.startSY);
    const mq=document.getElementById('boardMarquee');if(mq){mq.style.left=x+'px';mq.style.top=y+'px';mq.style.width=w+'px';mq.style.height=h+'px'}
    return;
  }
  if(bDrag.mode==='pan'){board.panX=bDrag.startPanX+dx;board.panY=bDrag.startPanY+dy;applyTransform();return}
  // item / group move
  bDrag.moves.forEach(m=>{const it=board.items.find(i=>i.id===m.id);if(!it)return;it.x=m.sx0+dx/board.zoom;it.y=m.sy0+dy/board.zoom;m.el.style.left=it.x+'px';m.el.style.top=it.y+'px'});
  renderEdges();
}
function onBoardPointerUp(e){
  if(!bDrag)return;
  const vp=document.getElementById('boardVp');
  try{vp.releasePointerCapture(e.pointerId)}catch(_){}
  vp.classList.remove('panning');
  if(bDrag.mode==='link'){
    const w=document.getElementById('boardWorld');if(w)w.classList.remove('linking');
    const tmp=document.getElementById('bedgeTmp');if(tmp)tmp.setAttribute('d','');
    const tgt=document.elementFromPoint(e.clientX,e.clientY);
    const inp=tgt&&tgt.closest?tgt.closest('.binport'):null;
    const tn=tgt&&tgt.closest?tgt.closest('.bnode'):null;
    let toId=null,role=null;
    if(inp){toId=inp.dataset.target;role=inp.dataset.inport}
    else if(tn){toId=tn.dataset.bid}
    if(toId&&toId!==bDrag.fromId){
      board.edges=board.edges||[];
      // replace any existing edge between the same pair into the same role slot
      board.edges=board.edges.filter(ed=>!(ed.from===bDrag.fromId&&ed.to===toId&&(ed.role||null)===(role||null)));
      board.edges.push({id:bid(),from:bDrag.fromId,to:toId,role:role||undefined});saveBoard();
    }
    renderEdges();bDrag=null;return;
  }
  if(bDrag.mode==='edge'){if(!bDrag.moved)removeEdge(bDrag.edgeId);bDrag=null;return}
  if(bDrag.mode==='marquee'){
    const mq=document.getElementById('boardMarquee');if(mq)mq.hidden=true;
    if(bDrag.moved){
      const r2=vp.getBoundingClientRect(),cx=e.clientX-r2.left,cy=e.clientY-r2.top;
      const x1=(Math.min(bDrag.startSX,cx)-board.panX)/board.zoom,y1=(Math.min(bDrag.startSY,cy)-board.panY)/board.zoom;
      const x2=(Math.max(bDrag.startSX,cx)-board.panX)/board.zoom,y2=(Math.max(bDrag.startSY,cy)-board.panY)/board.zoom;
      board.items.forEach(it=>{const el=document.querySelector('.bnode[data-bid="'+it.id+'"]');if(!el)return;const w=el.offsetWidth,h=el.offsetHeight;if(it.x<x2&&it.x+w>x1&&it.y<y2&&it.y+h>y1)selection.add(it.id)});
      renderSelection();
    }
    bDrag=null;return;
  }
  if(bDrag.mode==='item'){
    bDrag.moves.forEach(m=>{if(m.el)m.el.style.zIndex=''});
    if(bDrag.moved)saveBoard();
    else if(bDrag.clickedId&&!e.shiftKey){selection=new Set([bDrag.clickedId]);renderSelection()}
    bDrag=null;return;
  }
  if(bDrag.moved)saveBoard();
  bDrag=null;
}

/* ============ Board chat (Claude → prompt nodes) ============ */
const CHATKEY='scouts-chat-v1';
const CHAT_SYS="You are a prompt engineer for AI image-generation models (Google Gemini 'Nano Banana' and OpenAI image). The user describes an idea, often in Spanish. Reply with ONE short acknowledgement sentence in the user's language, then give a single refined, concise, visual image-generation prompt in English wrapped in a fenced code block tagged `prompt`, e.g.:\n```prompt\n<the prompt>\n```\nKeep prompts concrete and visual: subject, style, composition, lighting, mood. If the idea is only a style (e.g. 'estilo acuarela'), produce a reusable style prompt. If the user attaches one or more images, look at them carefully: describe their content, style, palette and composition, and craft the prompt to recreate or build on the attached image(s) as requested. If a [Current prompt to edit] is provided, apply the user's requested change to it and return the COMPLETE edited prompt in the code block (not just the change). Never put commentary inside the code block. Keep it to one prompt block per reply.";
let chatLog=[];try{chatLog=JSON.parse(localStorage.getItem(CHATKEY))||[]}catch(e){chatLog=[]}
let chatBusy=false;
function saveChat(){try{localStorage.setItem(CHATKEY,JSON.stringify(chatLog.slice(-40)))}catch(e){}}
function extractPrompts(text){const out=[];const re=/```prompt\s*\n([\s\S]*?)```/g;let m;while((m=re.exec(text)))out.push(m[1].trim());return out}
function stripPrompts(text){return text.replace(/```prompt\s*\n[\s\S]*?```/g,'').trim()}
function renderChat(){
  const head=document.getElementById('bcTitle');if(head)head.innerHTML=`<b>✦</b> ${T[lang].chat.title}`;
  const cl=document.getElementById('bcClear');if(cl)cl.textContent=T[lang].chat.clear;
  const txt=document.getElementById('bcText');if(txt)txt.placeholder=T[lang].chat.ph;
  const sb=document.getElementById('bcSend');if(sb){sb.textContent=T[lang].chat.send;sb.disabled=chatBusy}
  const box=document.getElementById('bcBody');if(!box)return;
  let html='';
  if(!chatLog.length&&!chatBusy)html+=`<div class="bc-empty">${T[lang].chat.empty}</div>`;
  chatLog.forEach(m=>{
    if(m.role==='user'){html+=`<div class="bc-msg user">${m.imgs&&m.imgs.length?'🖼️ ':''}${bEscape(m.text)}</div>`;return}
    const body=stripPrompts(m.text);
    if(body)html+=`<div class="bc-msg bot">${bEscape(body)}</div>`;
    extractPrompts(m.text).forEach(p=>{
      const esc=bEscape(p).replace(/"/g,'&quot;');
      const applyBtn=m.editTarget?`<button class="bp-apply" data-applynode="${m.editTarget}" data-applytext="${esc}">${T[lang].chat.apply}</button>`:'';
      html+=`<div class="bc-prompt"><div class="bp-txt">${bEscape(p)}</div>${applyBtn}<button data-addnode="${esc}">${T[lang].chat.addNode}</button></div>`;
    });
  });
  if(chatBusy)html+=`<div class="bc-msg bot">${T[lang].chat.thinking}</div>`;
  box.innerHTML=html;box.scrollTop=box.scrollHeight;
  renderChatAttach();
}
function renderChatAttach(){
  const el=document.getElementById('bcAttach');if(!el)return;
  const n=selectedImageSrcs().length,pn=selectedPromptNode();
  const parts=[];
  if(pn)parts.push('✏️ '+T[lang].chat.editing+': "'+(pn.text||'').slice(0,38)+(pn.text&&pn.text.length>38?'…':'')+'"');
  if(n)parts.push('🖼️ '+(n===1?T[lang].chat.attach1:T[lang].chat.attachN.replace('{n}',n)));
  if(parts.length){el.hidden=false;el.textContent=parts.join('  ·  ')}else el.hidden=true;
}
function addPromptNode(text){
  const c=viewportCenterWorld();
  board.items.push({id:bid(),type:'prompt',text:text,x:Math.round(c.x-120),y:Math.round(c.y-40),color:nextGenColor()});
  saveBoard();renderBoard();
}
function selectedImageSrcs(){return [...selection].map(id=>board.items.find(i=>i.id===id)).filter(it=>it&&it.type==='image'&&it.src).map(it=>it.src)}
function selectedPromptNode(){for(const id of selection){const it=board.items.find(i=>i.id===id);if(it&&it.type==='prompt')return it}return null}
function applyPromptToNode(id,text){const it=board.items.find(i=>i.id===id);if(it){it.text=text;saveBoard();renderBoard()}}
async function buildClaudeMessages(){
  const msgs=[];
  for(const m of chatLog){
    let textPart=m.text||'';
    if(m.editText!=null)textPart+='\n\n[Current prompt to edit — apply the requested change and return the COMPLETE edited prompt]\n'+m.editText;
    if(m.imgs&&m.imgs.length){
      const content=[];
      for(const src of m.imgs){try{const inl=await toInline(src);content.push({type:'image',source:{type:'base64',media_type:inl.mime,data:inl.data}})}catch(e){}}
      content.push({type:'text',text:textPart});
      msgs.push({role:m.role,content});
    }else msgs.push({role:m.role,content:textPart});
  }
  return msgs;
}
async function sendChat(){
  if(chatBusy)return;
  const ta=document.getElementById('bcText');const msg=(ta.value||'').trim();
  const imgs=selectedImageSrcs();
  const pn=selectedPromptNode();
  if(!msg&&!imgs.length&&!pn)return;
  if(!cfg.claudeKey){chatLog.push({role:'assistant',text:T[lang].chat.noKey});saveChat();renderChat();return}
  ta.value='';
  const entry={role:'user',text:msg||(pn?T[lang].chat.editDefault:T[lang].chat.fromImg)};
  if(imgs.length)entry.imgs=imgs;
  if(pn)entry.editText=pn.text||'';
  const targetId=pn?pn.id:null;
  chatLog.push(entry);chatBusy=true;saveChat();renderChat();
  try{
    const messages=await buildClaudeMessages();
    const body={model:cfg.claudeModel,max_tokens:1500,system:CHAT_SYS,messages};
    const res=await fetch('/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:cfg.claudeKey,body})});
    const data=await res.json();
    if(!res.ok)throw new Error((data&&data.error&&data.error.message)||('HTTP '+res.status));
    const text=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n').trim()||'(sin respuesta)';
    chatLog.push({role:'assistant',text,editTarget:targetId||undefined});
  }catch(err){
    chatLog.push({role:'assistant',text:T[lang].chat.err+': '+String(err&&err.message||err)});
  }
  chatBusy=false;saveChat();renderChat();
}

/* ---- Image generation from a prompt node (Gemini reuses existing key; OpenAI new key) ---- */
/* gather inputs connected to a prompt node: combined text + input images */
function connectedNodes(id){
  const ids=new Set();
  (board.edges||[]).forEach(e=>{if(e.from===id)ids.add(e.to);if(e.to===id)ids.add(e.from)});
  return [...ids].map(x=>board.items.find(i=>i.id===x)).filter(Boolean);
}
function gatherGenInputs(it){
  /* transitive: whole connected chain; images classified by edge role (ref=style, base=subject) */
  const adj={},byId=id=>board.items.find(x=>x.id===id);
  (board.edges||[]).forEach(e=>{(adj[e.from]=adj[e.from]||[]).push(e.to);(adj[e.to]=adj[e.to]||[]).push(e.from)});
  const comp=new Set([it.id]),queue=[it.id];
  while(queue.length){const id=queue.shift();(adj[id]||[]).forEach(n=>{if(!comp.has(n)){comp.add(n);queue.push(n)}})}
  const texts=[it.text||''];
  comp.forEach(id=>{if(id===it.id)return;const n=byId(id);if(n&&n.type==='prompt'&&n.text)texts.push(n.text)});
  const ref=new Set(),base=new Set();
  (board.edges||[]).forEach(e=>{
    if(!comp.has(e.from)||!comp.has(e.to))return;
    const a=byId(e.from),b=byId(e.to);if(!a||!b)return;
    let src=null;
    if(a.type==='image')src=a.src;else if(b.type==='image')src=b.src;
    else if(a.type==='scout')src=selImg(a.scoutId);else if(b.type==='scout')src=selImg(b.scoutId);
    if(!src)return;
    (e.role==='ref'?ref:base).add(src);
  });
  return {prompt:texts.filter(Boolean).join('. '),refImages:[...ref],baseImages:[...base]};
}
function openaiErr(data,status){
  let msg=(data&&data.error&&data.error.message)||('HTTP '+status);
  const code=(data&&data.error&&data.error.code)||'';
  if(/billing|quota|limit/i.test(code+' '+msg))msg+=' → Revisá saldo y límite mensual en platform.openai.com (Settings → Billing/Limits).';
  return msg;
}
async function genImage(provider,prompt,baseImages,refImages){
  baseImages=baseImages||[];refImages=refImages||[];
  const allImages=baseImages.concat(refImages);
  // all connected images are treated as strong references the model must use
  let txt=prompt;
  if(allImages.length){
    txt+=`\n\n[Image inputs] You are given ${allImages.length} reference image(s). Use them as strong visual references — draw on their subject, composition, colors and style to produce a result that fits the prompt. Do not ignore them.`;
  }
  if(provider==='openai'){
    if(!cfg.openaiKey)throw new Error(T[lang].imgen.noOai);
    if(allImages.length){
      // edits endpoint: send the connected images as inputs (image-to-image)
      const imgs=[];for(const src of allImages){try{const inl=await toInline(src);imgs.push(inl.data)}catch(e){}}
      const res=await fetch('/openai_edit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:cfg.openaiKey,model:cfg.openaiModel,prompt:txt,size:'1024x1024',images:imgs})});
      const data=await res.json();
      if(!res.ok)throw new Error(openaiErr(data,res.status));
      const d=(data.data||[])[0]||{};
      if(d.b64_json)return 'data:image/png;base64,'+d.b64_json;
      if(d.url)return d.url;
      throw new Error('OpenAI: no image returned');
    }
    const body={model:cfg.openaiModel,prompt:txt,size:'1024x1024'};
    const res=await fetch('/openai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:cfg.openaiKey,body})});
    const data=await res.json();
    if(!res.ok)throw new Error(openaiErr(data,res.status));
    const d=(data.data||[])[0]||{};
    if(d.b64_json)return 'data:image/png;base64,'+d.b64_json;
    if(d.url)return d.url;
    throw new Error('OpenAI: no image returned');
  }
  if(!cfg.key)throw new Error(T[lang].imgen.noGem);
  const parts=[{text:txt}];
  for(const src of allImages){try{const inl=await toInline(src);parts.push({inline_data:{mime_type:inl.mime,data:inl.data}})}catch(e){}}
  const body={contents:[{parts}],generationConfig:{responseModalities:['IMAGE']}};
  let lastErr='Gemini: no image returned';
  for(let attempt=0;attempt<3;attempt++){
    const res=await fetch('/gemini',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:cfg.model,key:cfg.key,body})});
    const data=await res.json();
    if(!res.ok){lastErr=(data&&data.error&&data.error.message)||('HTTP '+res.status);if(res.status>=500||res.status===429)continue;throw new Error(lastErr)}
    const rparts=(((data.candidates||[])[0]||{}).content||{}).parts||[];
    const ip=rparts.find(p=>p.inlineData||p.inline_data);
    if(ip){const inl=ip.inlineData||ip.inline_data;return `data:${inl.mimeType||inl.mime_type||'image/png'};base64,${inl.data}`;}
  }
  throw new Error(lastErr);
}
function freeImageSlot(prm){
  for(let row=0;row<60;row++)for(let col=0;col<4;col++){
    const x=prm.x+270+col*250,y=prm.y+row*250;
    if(!board.items.some(it=>it.id!==prm.id&&Math.abs(it.x-x)<190&&Math.abs(it.y-y)<190))return {x,y};
  }
  return {x:prm.x+270,y:prm.y};
}
/* distinct color per generation (duplicates/edits keep the source color) */
const GEN_COLORS=['#F563B1','#4BC1E9','#F8FB4C','#46d17a','#A981E9','#E6B30B','#ff7a59','#7D2EFF','#3B80C7','#C9E02F'];
function nextGenColor(){let i=parseInt(localStorage.getItem('scouts-gencolor'))||0;const c=GEN_COLORS[i%GEN_COLORS.length];localStorage.setItem('scouts-gencolor',String((i+1)%100000));return c}
/* node stays free: each generation drops a loading placeholder to the right, filled when ready */
async function generateFromPrompt(id,provider){
  const it=board.items.find(i=>i.id===id);if(!it)return;
  const {prompt,refImages,baseImages}=gatherGenInputs(it);
  const n=Math.max(1,Math.min(8,parseInt(it.batch)||1));
  const color=it.color||(it.color=nextGenColor());
  const phs=[];
  for(let i=0;i<n;i++){const slot=freeImageSlot(it);const ph={id:bid(),type:'image',src:'',_loading:true,x:slot.x,y:slot.y,color,prov:provider};board.items.push(ph);phs.push(ph.id)}
  renderBoard();
  for(const phId of phs){
    try{
      const durl=await genImage(provider,prompt,baseImages,refImages);
      const ref=await storeBoardImage(durl);
      const ph=board.items.find(i=>i.id===phId);if(ph){ph.src=ref;delete ph._loading;saveBoard();renderBoard()}
    }catch(err){
      const ph=board.items.find(i=>i.id===phId);if(ph){delete ph._loading;ph._err=String(err&&err.message||err);renderBoard();
        setTimeout(()=>{board.items=board.items.filter(z=>z.id!==phId);renderBoard()},5000)}
    }
  }
}

/* ---- Drag & drop external images onto the board (keeps aspect ratio) ---- */
function readDataURL(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(f)})}
function imgDims(src){return new Promise(res=>{const im=new Image();im.onload=()=>res({w:im.naturalWidth,h:im.naturalHeight});im.onerror=()=>res({w:240,h:240});im.src=src})}
async function dropImages(files,wx,wy){
  const arr=[...files].filter(f=>f.type.startsWith('image/'));
  for(const f of arr){
    const durl=await readDataURL(f);
    const dim=await imgDims(durl);const MAX=300;let w=dim.w,h=dim.h;
    if(w>=h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX}}else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX}}
    const ref=await storeBoardImage(durl);
    board.items.push({id:bid(),type:'image',src:ref,x:Math.round(wx),y:Math.round(wy),w,h});
    wx+=24;wy+=24;saveBoard();renderBoard();
  }
}
function onBoardDragover(e){if(e.dataTransfer&&[...e.dataTransfer.items||[]].some(i=>i.kind==='file')){e.preventDefault();e.dataTransfer.dropEffect='copy';document.getElementById('boardVp').classList.add('dropping')}}
function onBoardDrop(e){
  document.getElementById('boardVp').classList.remove('dropping');
  if(!e.dataTransfer||!e.dataTransfer.files.length)return;
  e.preventDefault();
  const vp=document.getElementById('boardVp'),r=vp.getBoundingClientRect();
  const wx=((e.clientX-r.left)-board.panX)/board.zoom-150,wy=((e.clientY-r.top)-board.panY)/board.zoom-150;
  dropImages(e.dataTransfer.files,wx,wy);
}

/* ============ View control ============ */
function showView(name){currentView=name;try{localStorage.setItem('scouts-view',name)}catch(e){}document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById('view-'+name).classList.add('active');renderNav();if(name==='settings')renderSettings();if(name==='board'){document.body.classList.add('board-active');renderProjects();renderBoard();renderChat()}else{document.body.classList.remove('board-active')}window.scrollTo(0,0)}
function openScoutPage(id){currentScout=id;renderScoutDetail(id);showView('scout');closeMenu()}

function renderAll(){
  document.documentElement.lang=lang;
  renderNav();renderExploreHead();renderGrid();renderRefs();
  if(currentView==='scout'&&currentScout)renderScoutDetail(currentScout);
  if(currentView==='settings')renderSettings();
  if(currentView==='board')renderBoard();
}
renderAll();

/* restore last view on reload (scout detail needs a selected scout → fall back to explore) */
try{const sv=localStorage.getItem('scouts-view');if(sv&&sv!=='explore'&&sv!=='scout'&&document.getElementById('view-'+sv))showView(sv);}catch(e){}

/* migrate any base64 images already in localStorage to disk (prevents quota loss) */
async function migrateToDisk(){
  let changed=false;
  for(const id of Object.keys(store)){const e=store[id];if(!e)continue;
    if(Array.isArray(e.opts))for(let i=0;i<e.opts.length;i++){const v=e.opts[i];if(typeof v==='string'&&v.indexOf('data:')===0){const p=await saveToDisk(v,id,'opt');if(p){e.opts[i]=p;changed=true}}}
    if(Array.isArray(e.mockups))for(let i=0;i<e.mockups.length;i++){const v=e.mockups[i];if(typeof v==='string'&&v.indexOf('data:')===0){const p=await saveToDisk(v,id,'mockup');if(p){e.mockups[i]=p;changed=true}}}
  }
  if(changed){saveStore();renderGrid();if(currentView==='scout'&&currentScout)renderGen(currentScout)}
}
migrateToDisk();

/* ============ Events ============ */
function setLang(l){if(l===lang)return;lang=l;document.querySelectorAll('.toggle button').forEach(b=>b.classList.toggle('on',b.dataset.lang===l));renderAll()}
document.querySelectorAll('.toggle').forEach(tg=>tg.addEventListener('click',e=>{const b=e.target.closest('button');if(b)setLang(b.dataset.lang)}));

document.getElementById('filters').addEventListener('click',e=>{const b=e.target.closest('.chip');if(!b)return;filter=b.dataset.f;renderExploreHead();renderGrid()});
document.getElementById('grid').addEventListener('click',e=>{const c=e.target.closest('.scout');if(c)openScoutPage(c.dataset.id)});

document.getElementById('fileInput').addEventListener('change',e=>{
  const id=e.target.dataset.target;
  if(id==='__tpl__'){const f=e.target.files[0];if(f){const r=new FileReader();r.onload=ev=>{cfg.tpl=ev.target.result;renderSettings()};r.readAsDataURL(f)}}
  else if(id==='__slot2__'){const f=e.target.files[0];if(f){const sc=currentScout;const r=new FileReader();r.onload=async ev=>{const durl=ev.target.result;const path=await saveToDisk(durl,sc,'slot2');try{setSlot2(sc,path||durl)}catch(err){alert('No se pudo guardar la imagen (almacenamiento lleno). Asegurate de tener el servidor proxy corriendo.')}renderSlot2(sc);composeLive(sc)};r.readAsDataURL(f)}}
  else if(id){addImages(id,e.target.files)}
  e.target.value='';e.target.dataset.target='';
});

// delegated clicks on scout detail (opts select / delete + back)
document.getElementById('view-scout').addEventListener('click',e=>{
  if(e.target.closest('#backBtn')){showView('explore');currentScout=null;return}
  if(e.target.closest('#genBtn')){generateMockup(currentScout);return}
  if(e.target.closest('#slot2Btn')){if(!selImg(currentScout)){alert(T[lang].gen.selectFirst);return}const fi=document.getElementById('fileInput');fi.dataset.target='__slot2__';fi.click();return}
  if(e.target.closest('#slot2Clear')){setSlot2(currentScout,'');renderSlot2(currentScout);composeLive(currentScout);return}
  if(e.target.closest('[data-livebig]')){openLightbox(liveData[currentScout]);return}
  const big=e.target.closest('[data-big]');if(big){openLightbox(entry(currentScout).mockups[+big.dataset.big]);return}
  const delmk=e.target.closest('[data-delmk]');if(delmk){e.stopPropagation();delMockup(currentScout,+delmk.dataset.delmk);return}
  const thumb=e.target.closest('[data-mk]');if(thumb){genState[currentScout]=Object.assign({},genState[currentScout]||{},{featured:+thumb.dataset.mk});renderGen(currentScout);return}
  const del=e.target.closest('[data-del]');if(del){e.stopPropagation();delOpt(currentScout,+del.dataset.del);return}
  const opt=e.target.closest('.opt');if(opt){selectOpt(currentScout,+opt.dataset.i)}
});

document.getElementById('nav').addEventListener('click',e=>{const a=e.target.closest('a[data-view]');if(!a)return;currentScout=null;showView(a.dataset.view);closeMenu()});

/* board interactions */
const boardVp=document.getElementById('boardVp');
boardVp.addEventListener('pointerdown',onBoardPointerDown);
boardVp.addEventListener('pointermove',onBoardPointerMove);
boardVp.addEventListener('pointerup',onBoardPointerUp);
boardVp.addEventListener('pointercancel',onBoardPointerUp);
boardVp.addEventListener('dblclick',onBoardDblClick);
boardVp.addEventListener('wheel',onBoardWheel,{passive:false});
boardVp.addEventListener('click',e=>{
  const d=e.target.closest('[data-bdel]');if(d){e.stopPropagation();removeItem(d.dataset.bdel);return}
  const g=e.target.closest('[data-gen]');if(g){e.stopPropagation();generateFromPrompt(g.dataset.genid,g.dataset.gen);return}
  const im=e.target.closest('[data-imgbig]');if(im){const it=board.items.find(i=>i.id===im.dataset.imgbig);if(it){const r=resolveImg(it.src);if(r)openLightbox(r);else if(isIdb(it.src))idbGet(idbId(it.src)).then(d=>{if(d){imgCache[idbId(it.src)]=d;openLightbox(d)}})}}
});
boardVp.addEventListener('input',e=>{const b=e.target.closest('[data-batchid]');if(b){const it=board.items.find(i=>i.id===b.dataset.batchid);if(it){it.batch=Math.max(1,Math.min(8,parseInt(b.value)||1));saveBoard()}}});
boardVp.addEventListener('dragstart',e=>e.preventDefault());
boardVp.addEventListener('dragover',onBoardDragover);
boardVp.addEventListener('dragleave',e=>{if(e.target===boardVp)boardVp.classList.remove('dropping')});
boardVp.addEventListener('drop',onBoardDrop);
document.getElementById('boardToolbar').addEventListener('click',onBoardToolbar);
const boardProjects=document.getElementById('boardProjects');
boardProjects.addEventListener('change',e=>{if(e.target.id==='bpSelect')switchBoard(e.target.value)});
boardProjects.addEventListener('click',e=>{
  if(e.target.id==='bpNew')newBoard();
  else if(e.target.id==='bpRename'){const b=boardsList.find(x=>x.id===activeBoardId);const n=window.prompt(T[lang].board.renamePrompt,b?b.name:'');if(n!=null)renameBoard(activeBoardId,n)}
  else if(e.target.id==='bpDelete'){if(boardsList.length>1&&window.confirm(T[lang].board.deleteConfirm))deleteBoard(activeBoardId)}
});
function bIsTyping(t){return t&&(/^(INPUT|TEXTAREA|SELECT)$/.test(t.tagName)||t.isContentEditable)}
document.addEventListener('keydown',e=>{
  if(currentView!=='board')return;
  if(e.code==='Space'&&!bIsTyping(e.target)){if(!spaceDown){spaceDown=true;boardVp.classList.add('grab')}e.preventDefault();return}
  if((e.key==='Delete'||e.key==='Backspace')&&!bIsTyping(e.target)&&selection.size){
    e.preventDefault();
    selection.forEach(id=>{board.items=board.items.filter(i=>i.id!==id);board.edges=(board.edges||[]).filter(ed=>ed.from!==id&&ed.to!==id)});
    selection.clear();saveBoard();renderBoard();
  }
});
document.addEventListener('keyup',e=>{if(e.code==='Space'){spaceDown=false;if(boardVp)boardVp.classList.remove('grab')}});

/* board chat */
document.getElementById('bcSend').addEventListener('click',sendChat);
document.getElementById('bcText').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat()}});
document.getElementById('bcToggle').addEventListener('click',()=>{document.getElementById('boardChat').classList.toggle('collapsed')});
document.getElementById('bcHead').addEventListener('click',e=>{if(e.target.closest('button'))return;document.getElementById('boardChat').classList.toggle('collapsed')});
document.getElementById('bcClear').addEventListener('click',()=>{chatLog=[];saveChat();renderChat()});
document.getElementById('bcBody').addEventListener('click',e=>{
  const ap=e.target.closest('[data-applynode]');if(ap){applyPromptToNode(ap.dataset.applynode,ap.dataset.applytext);return}
  const b=e.target.closest('[data-addnode]');if(b)addPromptNode(b.dataset.addnode);
});
document.getElementById('brandHome').addEventListener('click',()=>{currentScout=null;showView('explore')});

const sidebar=document.getElementById('sidebar'),ov2=document.getElementById('ov2');
function closeMenu(){sidebar.classList.remove('open');ov2.classList.remove('show')}
document.getElementById('menuBtn').addEventListener('click',()=>{sidebar.classList.add('open');ov2.classList.add('show')});
ov2.addEventListener('click',closeMenu);

/* lightbox */
const lightbox=document.getElementById('lightbox');
function openLightbox(src){if(!src)return;document.getElementById('lbImg').src=src;const dl=document.getElementById('lbDl');dl.href=src;dl.textContent='⬇ '+T[lang].gen.download;lightbox.classList.add('open')}
function closeLightbox(){lightbox.classList.remove('open');document.getElementById('lbImg').src=''}
document.getElementById('lbClose').addEventListener('click',closeLightbox);
lightbox.addEventListener('click',e=>{if(e.target===lightbox)closeLightbox()});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLightbox()});
</script>
